name: Update Playlist Cookies

on:
  schedule:
    - cron: '0 */6 * * *'      # every 6 hours

  workflow_dispatch:
    inputs:
      force_update:
        description: 'Force update even if no changes detected (yes/no)'
        required: false
        default: 'no'
        type: choice
        options:
          - 'no'
          - 'yes'
      dry_run:
        description: 'Dry run - show changes but do not update gist/repo (yes/no)'
        required: false
        default: 'no'
        type: choice
        options:
          - 'no'
          - 'yes'

jobs:
  update-playlist:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Extract Cookie and Update zstar.m3u
        env:
          GIST_ID: ${{ vars.GIST_ID }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          FORCE_UPDATE: ${{ github.event.inputs.force_update || 'no' }}
          DRY_RUN:     ${{ github.event.inputs.dry_run     || 'no' }}
        run: |
          python << 'EOF'
          import requests
          import re
          import os
          import sys

          # ───────────────────────────────────────────────
          #   CONFIG
          # ───────────────────────────────────────────────
          WORKER_URL    = "https://zstar.pfy.workers.dev"
          M3U_FILENAME  = "zstar.m3u"
          GIST_ID       = os.getenv("GIST_ID")
          GH_TOKEN      = os.getenv("GH_TOKEN")
          FORCE_UPDATE  = os.getenv("FORCE_UPDATE", "no").lower() == "yes"
          DRY_RUN       = os.getenv("DRY_RUN", "no").lower() == "yes"
          USER_AGENT    = "plaYtv/7.1.3 (Linux;Android 13) ygx/69.1 ExoPlayerLib/824.0"

          if not GIST_ID or not GH_TOKEN:
              print("Error: GIST_ID or GH_TOKEN missing.")
              sys.exit(1)

          HEADERS = {
              "Authorization": f"token {GH_TOKEN}",
              "Accept": "application/vnd.github.v3+json"
          }

          # 1. Get fresh cookie
          try:
              resp = requests.get(WORKER_URL, timeout=12)
              resp.raise_for_status()
              match = re.search(r'__hdnea__=([^"\'\s&]+)', resp.text)
              if not match:
                  print("Error: __hdnea__ not found.")
                  sys.exit(1)
              cookie_val = match.group(1)
              token_str = f"__hdnea__={cookie_val}"
              print(f"Extracted token: {token_str}")
          except Exception as e:
              print(f"Failed to get cookie: {e}")
              sys.exit(1)

          # 2. Download current gist
          gist_url = f"https://api.github.com/gists/{GIST_ID}"
          try:
              r = requests.get(gist_url, headers=HEADERS, timeout=10)
              r.raise_for_status()
              gist_data = r.json()
              if M3U_FILENAME not in gist_data["files"]:
                  print(f"File '{M3U_FILENAME}' not found in gist.")
                  sys.exit(1)
              current_content = gist_data["files"][M3U_FILENAME]["content"]
              lines = current_content.splitlines()
          except Exception as e:
              print(f"Failed to read gist: {e}")
              sys.exit(1)

          # 3. Update playlist logic (same as before – fixed slash + user-agent + token)
          updated_lines = []
          updated_count = 0
          in_channel_block = False

          for line in lines:
              stripped = line.strip()
              if stripped.startswith("#EXTINF:"):
                  in_channel_block = True
                  updated_lines.append(line)
                  continue

              if in_channel_block and stripped.startswith("http"):
                  # Fix URL: //bpk-tv → /bpk-tv
                  clean_url = re.sub(r'^//bpk-tv', '/bpk-tv', stripped)
                  # Remove old token
                  clean_url = re.sub(r'([?&])__hdnea__=[^&]*', '', clean_url)
                  sep = "&" if "?" in clean_url else "?"
                  new_url = f"{clean_url.rstrip()}{sep}{token_str}"

                  updated_lines.append(f"#EXTVLCOPT:http-user-agent={USER_AGENT}")
                  updated_lines.append(new_url)
                  updated_count += 1
                  in_channel_block = False
                  continue

              updated_lines.append(line)

          print(f"Would update {updated_count} stream URLs.")

          new_content = "\n".join(updated_lines).rstrip() + "\n"

          if new_content == current_content and not FORCE_UPDATE:
              print("No changes detected (and force_update not enabled).")
              sys.exit(0)

          if DRY_RUN:
              print("\nDRY RUN MODE – no changes will be pushed")
              print("First 300 chars of new content:")
              print(new_content[:300] + "...")
              print("\nWould have updated the gist.")
              sys.exit(0)

          # 4. Update gist
          update_payload = {
              "files": {
                  M3U_FILENAME: {"content": new_content}
              }
          }

          try:
              resp = requests.patch(gist_url, headers=HEADERS, json=update_payload, timeout=10)
              resp.raise_for_status()
              print(f"Successfully updated gist → {M3U_FILENAME}")
          except Exception as e:
              print(f"Failed to update gist: {e}")
              sys.exit(1)

          EOF

      - name: Commit changes to repository (if any)
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add zstar.m3u || true
          git commit -m "chore: refreshed zstar.m3u cookies [skip ci]" || echo "No changes to commit"
          git push || echo "Push not needed"
