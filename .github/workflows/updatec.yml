- name: Extract Cookie and Update zstar.m3u
        env:
          GIST_ID: ${{ vars.GIST_ID }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          python << 'EOF'
          import requests
          import re
          import os
          import sys

          # ───────────────────────────────────────────────
          #   CONFIG
          # ───────────────────────────────────────────────
          WORKER_URL    = "https://zstar.pfy.workers.dev"
          M3U_FILENAME  = "zstar.m3u"
          GIST_ID       = os.getenv("GIST_ID")
          GH_TOKEN      = os.getenv("GH_TOKEN")
          USER_AGENT    = "plaYtv/7.1.3 (Linux;Android 13) ygx/69.1 ExoPlayerLib/824.0"

          if not GIST_ID or not GH_TOKEN:
              print("Error: GIST_ID or GH_TOKEN environment variable is missing.")
              sys.exit(1)

          HEADERS = {
              "Authorization": f"token {GH_TOKEN}",
              "Accept": "application/vnd.github.v3+json"
          }

          # ───────────────────────────────────────────────
          # 1. Get fresh cookie from worker
          # ───────────────────────────────────────────────
          try:
              resp = requests.get(WORKER_URL, timeout=12)
              resp.raise_for_status()

              match = re.search(r'__hdnea__=([^"\'\s&]+)', resp.text)
              if not match:
                  print("Error: Could not find __hdnea__ in worker response.")
                  print("Response snippet:", resp.text[:400])
                  sys.exit(1)

              cookie_val = match.group(1)
              token_str = f"__hdnea__={cookie_val}"
              print(f"Extracted token: {token_str}")

          except Exception as e:
              print(f"Failed to get cookie from worker: {e}")
              sys.exit(1)

          # ───────────────────────────────────────────────
          # 2. Download current gist content
          # ───────────────────────────────────────────────
          gist_url = f"https://api.github.com/gists/{GIST_ID}"
          try:
              r = requests.get(gist_url, headers=HEADERS, timeout=10)
              r.raise_for_status()
              gist_data = r.json()

              if M3U_FILENAME not in gist_data["files"]:
                  print(f"Error: File '{M3U_FILENAME}' not found in gist.")
                  sys.exit(1)

              current_content = gist_data["files"][M3U_FILENAME]["content"]
              lines = current_content.splitlines()

          except Exception as e:
              print(f"Failed to read gist: {e}")
              sys.exit(1)

          # ───────────────────────────────────────────────
          # 3. Update playlist: fix URL + add user-agent + inject token
          # ───────────────────────────────────────────────
          updated_lines = []
          updated_count = 0
          in_channel_block = False
          pending_url = None

          for line in lines:
              stripped = line.strip()

              if stripped.startswith("#EXTINF:"):
                  in_channel_block = True
                  pending_url = None
                  updated_lines.append(line)
                  continue

              if in_channel_block:
                  # Add user-agent once per channel (before the URL)
                  if stripped.startswith("http") and not any(x in stripped for x in ["#EXTVLCOPT", "#KODIPROP"]):
                      # This is likely the old URL line → replace with user-agent + fixed URL + token
                      clean_url = re.sub(r'^//bpk-tv', '/bpk-tv', stripped)           # fix double slash
                      clean_url = re.sub(r'([?&])__hdnea__=[^&]*', '', clean_url)     # remove old token
                      sep = "&" if "?" in clean_url else "?"
                      new_url = f"{clean_url}{sep}{token_str}"

                      updated_lines.append(f"#EXTVLCOPT:http-user-agent={USER_AGENT}")
                      updated_lines.append(new_url)
                      updated_count += 1
                      pending_url = None
                      in_channel_block = False  # assume URL ends the block
                      continue

                  # Preserve other lines (#KODIPROP, empty lines, etc.)
                  updated_lines.append(line)
              else:
                  updated_lines.append(line)

          print(f"Updated {updated_count} stream URLs (added user-agent where needed).")

          # ───────────────────────────────────────────────
          # 4. Update gist (only if changed)
          # ───────────────────────────────────────────────
          new_content = "\n".join(updated_lines).rstrip() + "\n"
          if new_content == current_content:
              print("No changes detected in playlist.")
              sys.exit(0)

          update_payload = {
              "files": {
                  M3U_FILENAME: {
                      "content": new_content
                  }
              }
          }

          try:
              resp = requests.patch(gist_url, headers=HEADERS, json=update_payload, timeout=10)
              resp.raise_for_status()
              print(f"Successfully updated gist → {M3U_FILENAME}")
          except Exception as e:
              print(f"Failed to update gist: {e}")
              sys.exit(1)

          EOF
